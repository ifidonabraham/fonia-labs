<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Fonia Labs mark">
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="28%" stop-color="#7dd3fc"/>
      <stop offset="62%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="28" stroke="#cbd5e1" stroke-width="3.2" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="38.5 5.5" transform="rotate(-45 32 32)"/>
  <circle cx="32" cy="32" r="21" stroke="#94a3b8" stroke-width="2.4" stroke-opacity="0.45" stroke-linecap="round" stroke-dasharray="28.5 4.5" transform="rotate(-45 32 32)"/>
  <circle cx="32" cy="32" r="14" stroke="#38bdf8" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="18 3.8" transform="rotate(-45 32 32)"/>
  <circle cx="32" cy="32" r="12" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="7.5" fill="url(#orb)" filter="url(#glow)"/>
  <ellipse cx="29.5" cy="28.5" rx="2.8" ry="1.8" fill="white" fill-opacity="0.5" transform="rotate(-30 29.5 28.5)"/>
</svg>
