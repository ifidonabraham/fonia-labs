<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fonia Labs — Site Badge Design</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      min-height: 100vh;
      background: #0b1120;
    }

    /* ── Badge ─────────────────────────────────────── */
    .fonia-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px 7px 9px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(11, 17, 32, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: opacity 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .fonia-badge:hover { opacity: 0.82; transform: translateY(-2px); }

    /* Light variant */
    .fonia-badge.light {
      background: rgba(255, 255, 255, 0.93);
      border-color: rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    /* Text stack */
    .fb-text   { display: flex; flex-direction: column; gap: 1px; }

    .fb-label  {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #94a3b8;
    }
    .fonia-badge.light .fb-label { color: #64748b; }

    .fb-name   { display: flex; align-items: baseline; font-size: 12.5px; font-weight: 700; letter-spacing: -0.02em; }

    .fb-fon    { color: #f1f5f9; }
    .fonia-badge.light .fb-fon { color: #0f172a; }

    .fb-ia     { color: #38bdf8; }

    .fb-labs   {
      font-size: 8.5px;
      letter-spacing: 0.32em;
      color: #64748b;
      margin-left: 5px;
      align-self: center;
    }
    .fonia-badge.light .fb-labs { color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Dark version (for light-background sites) -->
  <a href="https://fonia-labs.vercel.app" class="fonia-badge" target="_blank" rel="noopener noreferrer">
    <svg width="20" height="20" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#38bdf8" stroke-width="3.2" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="38.5 5.5" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="21" stroke="#94a3b8" stroke-width="2.4" stroke-opacity="0.45" stroke-linecap="round" stroke-dasharray="28.5 4.5" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="14" stroke="#38bdf8" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="18 3.8" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="7.5" fill="#38bdf8" fill-opacity="0.9"/>
      <ellipse cx="29.5" cy="28.5" rx="2.8" ry="1.8" fill="white" fill-opacity="0.45" transform="rotate(-30 29.5 28.5)"/>
    </svg>
    <span class="fb-text">
      <span class="fb-label">A Fonia Labs Company</span>
      <span class="fb-name">
        <span class="fb-fon">Fon</span><span class="fb-ia">ia</span>
        <span class="fb-labs">LABS</span>
      </span>
    </span>
  </a>

  <!-- Light version (for dark-background sites) -->
  <a href="https://fonia-labs.vercel.app" class="fonia-badge light" target="_blank" rel="noopener noreferrer">
    <svg width="20" height="20" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#38bdf8" stroke-width="3.2" stroke-opacity="0.7" stroke-linecap="round" stroke-dasharray="38.5 5.5" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="21" stroke="#94a3b8" stroke-width="2.4" stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="28.5 4.5" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="14" stroke="#38bdf8" stroke-width="1.8" stroke-opacity="0.6" stroke-linecap="round" stroke-dasharray="18 3.8" transform="rotate(-45 32 32)"/>
      <circle cx="32" cy="32" r="7.5" fill="#2563eb"/>
      <ellipse cx="29.5" cy="28.5" rx="2.8" ry="1.8" fill="white" fill-opacity="0.55" transform="rotate(-30 29.5 28.5)"/>
    </svg>
    <span class="fb-text">
      <span class="fb-label">A Fonia Labs Company</span>
      <span class="fb-name">
        <span class="fb-fon">Fon</span><span class="fb-ia">ia</span>
        <span class="fb-labs">LABS</span>
      </span>
    </span>
  </a>

</body>
</html>
