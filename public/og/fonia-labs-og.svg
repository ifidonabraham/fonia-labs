<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Fonia Labs — Where Ideas Become Companies">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1120"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="28%" stop-color="#7dd3fc"/>
      <stop offset="62%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="150" r="430" fill="url(#aura)"/>
  <g transform="translate(96,92) scale(1.55)">
    <circle cx="32" cy="32" r="28" stroke="#cbd5e1" stroke-width="3.2" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="38.5 5.5" transform="rotate(-45 32 32)"/>
    <circle cx="32" cy="32" r="21" stroke="#94a3b8" stroke-width="2.4" stroke-opacity="0.45" stroke-linecap="round" stroke-dasharray="28.5 4.5" transform="rotate(-45 32 32)"/>
    <circle cx="32" cy="32" r="14" stroke="#38bdf8" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="18 3.8" transform="rotate(-45 32 32)"/>
    <circle cx="32" cy="32" r="7.5" fill="url(#orb)"/>
  </g>
  <text x="206" y="158" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">
    <tspan fill="#f8fafc">Fon</tspan><tspan fill="#38bdf8">ia</tspan><tspan fill="#94a3b8" font-size="26" font-weight="600" letter-spacing="10"> LABS</tspan>
  </text>
  <text x="96" y="358" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="-3" fill="#f8fafc">Where Ideas Become</text>
  <text x="96" y="454" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="-3" fill="#38bdf8">Companies.</text>
  <text x="96" y="540" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="500" fill="#94a3b8">A global innovation group building companies, platforms, and products.</text>
