    <path d="M14 20 A21 21 0 0 1 50 16" stroke="#cbd5e1" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M44 20 A17 17 0 0 1 44 44" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
